site_name: AvNav Documentation
theme: 
  name: material
  custom_dir: overrides
  features:
    - search.suggest
    - search.highlight
nav: 
  - Willkommen: de/index.md
  - Beschreibung: 
    - de/description/what_is_avnav.md
    - de/description/how_does_it_works.md
  - Getting started:
    - de/getting_started/raspi_image.md
    - de/getting_started/debian.md
    - de/getting_started/ubuntu.md
    - de/getting_started/openplotter.md
    - de/getting_started/windows.md
    - de/getting_started/android.md
    - de/getting_started/daily.md
  - First steps:
    - de/first_steps/wlan.md
    - de/first_steps/config_backend.md
    - de/first_steps/config_frontend.md
  - Charts:
    - de/charts/raster.md
    - de/charts/vector.md
  - Overlay: de/etc/overlay.md
  - Plugins: 
    - de/plugins/mapproxy.md
    - de/plugins/ocharts.md
    - de/plugins/ochartsng.md
  - Technical: 
    - de/technical/server_configuration.md
    - de/plugins/plugins.md
  - Special:
    - de/special/android.md
  - Community Support: de/support.md
plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - build: true
          default: true
          locale: de
          name: Deutsch
        - build: true
          locale: en
          name: English
          nav_translations:
            Willkommen: Welcome
            Beschreibung: Description
  - autorefs
  - search
  - macros
extra_css:
  - extra/extra.css
extra_javascript:
  - extra/extra.js
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
        anchor_linenums: true
